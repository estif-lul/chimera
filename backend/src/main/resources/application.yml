spring:
  application:
    name: chimera-control-plane

  datasource:
    url: ${CHIMERA_DB_URL:jdbc:postgresql://localhost:5432/chimera}
    username: ${CHIMERA_DB_USERNAME:chimera}
    password: ${CHIMERA_DB_PASSWORD:chimera_local}

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: public

  data:
    redis:
      url: ${CHIMERA_REDIS_URL:redis://localhost:6379}

  security:
    oauth2:
      client:
        registration:
          chimera-oidc:
            provider: chimera-oidc
            client-id: ${CHIMERA_OIDC_CLIENT_ID:}
            client-secret: ${CHIMERA_OIDC_CLIENT_SECRET:}
            scope: openid,profile,email
        provider:
          chimera-oidc:
            issuer-uri: ${CHIMERA_OIDC_ISSUER_URI:}

chimera:
  jwt:
    signing-key: ${CHIMERA_JWT_SIGNING_KEY:change-me-in-production}
  weaviate:
    url: ${CHIMERA_WEAVIATE_URL:http://localhost:8081}
    api-key: ${CHIMERA_WEAVIATE_API_KEY:}
  mcp:
    resource-gateway-url: ${CHIMERA_MCP_RESOURCE_GATEWAY_URL:http://localhost:9000}
    ideogram-url: ${CHIMERA_MCP_IDEOGRAM_URL:}
    midjourney-url: ${CHIMERA_MCP_MIDJOURNEY_URL:}
    runway-url: ${CHIMERA_MCP_RUNWAY_URL:}
    luma-url: ${CHIMERA_MCP_LUMA_URL:}
  allowed-origins: ${CHIMERA_ALLOWED_ORIGINS:http://localhost:3000}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.chimera: DEBUG
  pattern:
    console: "%d{ISO8601} [%thread] %-5level %logger{36} [%X{correlationId}] - %msg%n"
