services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: chimera
      POSTGRES_USER: chimera
      POSTGRES_PASSWORD: chimera_local
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chimera -d chimera"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  weaviate:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    environment:
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
    ports:
      - "8081:8080"
      - "50051:50051"
    volumes:
      - weaviatedata:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "-qO", "-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    image: maven:3.9.11-eclipse-temurin-21
    working_dir: /workspace/backend
    command: ["mvn", "spring-boot:run"]
    environment:
      CHIMERA_DB_URL: jdbc:postgresql://postgres:5432/chimera
      CHIMERA_DB_USERNAME: chimera
      CHIMERA_DB_PASSWORD: chimera_local
      CHIMERA_REDIS_URL: redis://redis:6379
      CHIMERA_WEAVIATE_URL: http://weaviate:8080
      CHIMERA_ALLOWED_ORIGINS: http://localhost:5173
      CHIMERA_SEED_ENABLED: "true"
    volumes:
      - ./backend:/workspace/backend
      - m2cache:/root/.m2
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      weaviate:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    working_dir: /workspace/frontend
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0 --port 5173"]
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    volumes:
      - ./frontend:/workspace/frontend
      - frontend_node_modules:/workspace/frontend/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
  weaviatedata:
  m2cache:
  frontend_node_modules:
