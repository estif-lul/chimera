name: Main

on:
  push:

jobs:
  backend-test:
    name: Make Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: chimera
          POSTGRES_USER: chimera
          POSTGRES_PASSWORD: chimera_local
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chimera -d chimera"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CHIMERA_DB_URL: jdbc:postgresql://localhost:5432/chimera
      CHIMERA_DB_USERNAME: chimera
      CHIMERA_DB_PASSWORD: chimera_local
      CHIMERA_REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Install Make
        run: sudo apt-get update && sudo apt-get install -y make

      - name: Run backend tests
        run: make test